front:
  text: 序經曰寧醫十丈夫難醫一小兒夫小兒也臟腑脆嫩氣血未定經絡脈息軟弱如絲毫易虛易實乍冷乍熱口不能言證情手不能指病處苟不考其方而先為之所則當局者迷終不免束手待盡其為病慱施姑舍是自家之薦遭兒戚心常痛之昨年秋浮屠正訓袖示一冊子曰此古皇明成斯文逸其名號無忌先生所撰保幼新編也論症制方最為詳備而世醫之等視文具流傳爛紙訓恐久而漫滅蕩瓶鉢付剞劂幸先生之惠一言辨諸首也余於醫學實昧昧焉不能有以測其說之淺深重以衰病倥傯經歲不遑近於舊簏中間閲其所傳本蓋其說原於古經附以新方刪繁撮要無浩慱難尋之患參運氣化五行察陰陽看日時對證輒效如持左契今得廣其流布家藏而人誦之雖非學為方者開卷瞭然及時投劑俾赤子既殊而回蘇之共登慈航同躋壽域夫儒之斥佛以其用功於虛無寂滅而止耳今乃於瓶水枯淡中有此竭心力念及壽民之方孰謂吾儒之所未能者以浮屠氏而能之乎余於是益痛其見之之晚而僕僕愧而敘龍集乙巳七夕勿齊病夫盧光履撰
