body:
  text: 凡例一小兒急病臨時考方有若當局者迷常有不及治之患逮其病未發宜熟覽此一通使心目瞭然於諸證而預備緊入之材然後庶可趁其證情之未危而治之也一小兒急病皆入重材鄉鄙貧家卒難覓用終未免束手待盡非所以濟夭之意也今者諸方湯散丸中擇其妙緊之劑減其難得之材而另加鄉産之性相近者更為制方雖涉僭越而庶可為活命之一助焉一古人治病用意不同立方甚煩猝當危急之證未及精擇其當劑雜施諸方使標本失次經緯錯亂或救或不救寧不懼哉小兒之病不過曰驚熱風痰而已制方雖殊而所入之材大同小異故敢以管見刪其峻毒之材取其和平之味合為通治之劑而如有別訂可以兼治者則別書加減法若不可兼治則別立一二方以為便考之地爾一湯劑分錢太過一二歲兒則一帖分五六次飲之五六歲兒則分二三次飲之酌量用之可也運氣流行法干曰運支曰氣化氣五行甲己土乙庚金丙辛水丁壬木戊癸火子午火丑未土寅申火卯酉金辰戌水巳亥木看日運氣同曰天符得病危同困氣生運曰順化氣克運曰天刑運生氣曰小逆運克氣曰不和運臨氣曰歲會得病執持甲辰甲戌丙子丁卯之年是也符會合曰太乙得病立死戊午乙酉己未己丑之年是也客氣旁通看年子午太陽初之氣丑未厥陰初之氣寅申少陰初之氣卯酉太陰初之氣辰戌少陽初之氣巳亥陽明初之氣看節大寒初春分前初之氣主之春分初小滿前二之氣主之小滿初大暑前三之氣主之大暑初秋分前四之氣主之秋分初小雪前五之氣主之小雪初大寒前六之氣主之計法先考年之屬某之支某經初之氣次考月之屬某節某之氣主之次考下輪圖則知某經客氣之為某病也看日時子屬膽胞胎醜屬肝水土生起巳寅屬肺木生起申卯屬大腸金生起寅辰屬胃火生起亥巳屬脾午屬心未屬小腸申屬膀胱酉屬腎戌屬心胞亥屬三焦少陽手三焦足膽熱疾陽明手大腸足胃厲疾太陽手小腸足膀胱寒疾少陰手心足腎心疾厥陰手心包足肝末疾太陰手肺足脾腸疾入門曰醫而不知運氣如面牆而立況未語小兒之病尤難辨其某經之所屬保幼之家不可以不知此也小兒病源總論小兒之病皆出於熱何也蓋男多腎火女多肝火腎有火則精熱肝有火則血熱小兒稟受父母之精血而成胎故小兒之病皆由於胎熱也經曰熱生風又曰熱生痰蓋胎熱挾風上升則為頭瘡聤耳齒疳雀目之證外散則為丹毒癮疹遍身胎腫之證胎熱挾風與痰而流注於頭項胸背腋脅肢節則為瘰癧癭瘤走馬飛痰厥不仁不遂龜胸龜背之證風痰火乘虛氣所虛邪湊焉而聚合於內臟則為急驚實熱慢驚虛熱狂實熱癲虛熱癇釣痓柔痙強疝淋浮脹之證是以胎熱變生六證風熱痰火燥濕六證養成百病百病根委不過曰胎熱而已熱生痰者熱多則津液煎熬而成痰也凡小兒稟氣有虛實氣實則熱亦實氣虛則熱亦虛虛熱甚而痰多風小則為慢驚氣虛則熱愈增勢熱甚則痰愈增勢實熱甚而痰少風多則為急驚凡治急驚先以清熱為主治慢驚先以補氣消痰為主驚有三證急驚慢驚慢脾風也眼半開半合將成脾風之候驚風三次復發則為癇也驚有八候一搐臂肘伸縮二搦十指皆合三掣勢如提掣四顫頭身顫動五反身首反張六引手如挽弓七竄目直上竄八視晴露斜視搐有五證身熱力大者急驚身冷力小者慢驚仆地作聲醒時吐沫者癇頭仰視者天吊角弓反張者痓脾風有五證頭雖熱眼珠青白而足冷頭雖熱或腹脹而足冷頭雖熱或泄瀉而足冷頭雖熱或嘔吐而足冷頭雖熱或渴而足冷者脾風之候凡頭熱足冷者皆真元不足而虛熱上升之致驚搐無聲者順有聲者逆男為陽屬木故發搐之時左視水位肺則無聲右視金位肺則有聲女人反是蓋金木相擊故也心主驚實則多叫哭驚悸手足動搖發熱飲水心氣熱則合面而臥熱實則仰臥目上竄舌強不能語虛則困臥驚悸不安肝主風實則目直視大叫呵缺項急煩悶甚則兩眥俱緊不轉目睛發驚咬牙手循衣亂捻物身強反張脾主困實則困睡身熱飲水泄瀉赤黃色不思飲食睡不露睛虛則吐瀉白色睡露睛或有痰肺主喘實則悶亂喘促或渴虛則哽氣長出氣短唇白色腎主無虛實則目無精光畏明體骨重虛劫神氣不足目中白睛多顱解顱開面色㿠白腎虛者下竄或脛寒足熱不喜覆衣五臟傳變皆痰為患蓋痰乃風苗火靜則伏於脾火動則壅於脾痰火交作則為驚風結滯則為癇釣來去則為瀉青皆由脾濕而成保元湯加白芍藥以養血為使乃慢驚之養劑也辨實熱性急數啼汗熱寤寐多驚大便小便不通有微恙身輒烘熱喜飲水辨虛熱性緩聲懦遍身如常腦後偏濕盜汗汗冷便滑數泄上熱下寒口內糜爛善發諸疳數吐乳流涎常有喉間痰聲善噫屎色青而又白胎熱預治方小兒初生急以甘草一錢黃連五分煎水蘸帛裹手指拭兒口內惡汁且以二味煎水飲之俾兒吐出腹中穢濁之水或下惡物於大便則兒無雜病善行痘疹加人參一二分同煎為妙一方硃砂一字調煉蜜蘸兒口內咽下則一生免痘疹之患小兒初生即以綿絮多漬産血陰乾無使腐傷藏於不熱處小兒氣暫不平口熱身溫上綿血浸溫水出之頻頻飲之治兒百病一云臍帶中血尤佳取狗糞露干色白者蜜炙作末浸白沸湯去滓頻頻溫服預防慢急驚火丹胎腫口疳等症兒生後臍帶脫落即取置新瓦上用炭火四圍燒至煙將盡放出地上用瓦蓋之存性研為末預將硃砂透明者細末水飛臍帶末若五分重硃砂和二分半生地當歸身濃煎汁一二蜆小蛤殼調和煎三味飲兒一日內用盡次日大便遺下汙穢之物終身永無痘疹及諸疾之患此延生第一妙方初生危證小兒初生有即死者急看口中懸雍前齶上有泡如石榴子以指摘破出血以帛拭之摻發灰若惡血入於口中則即死小兒初生氣欲絶不能啼必是難産時所傷或冒寒所致急以綿絮抱兒置懷中勿斷臍帶且持胞衣置爐火中燒之且醋湯或艾湯洗臍帶令熏氣入兒腹中則氣回啼哭如常方可斷臍帶一方人參烏藥各二三分同煎滴兒口中亦妙小兒初生面青身冷口噤者乃産母臨産前過食生冷性寒之物寒氣移胎而然急煎人參白殭蠶甘草各二三分飲之小兒初生嘔吐不能飲乳者乃穢惡之水入口腹而然黃連枳角殼也赤茯苓甘草各二三分煎水和蜜飲之小兒初生口內白屑滿舌不能吮乳名曰鵝口急以亂髮纏指頭蘸薄荷汁或井花水拭之如不脫用石雄黃黃連甘草等分為末和蜜塗口內一方鼠婦蟲取汁塗之一方白楊枝取瀝塗之神效小兒初生遍身無皮但是紅肉以白早米粉摻之候生皮乃止白早米早稻米小兒初生遍身如魚泡如水晶碎則水流蜜陀僧末摻之無則可用白早米粉因服蘇合香丸方見下小兒初生不能吮乳者口內生齒屎名馬牙以針刮腫核塗白清即效白清無則生清亦可不治必死小兒初生口唇緊小不能開名曰繭唇黃柏五倍子甘草等分為末和白清塗之一方牛黃加竹瀝飲之最妙不急治則必死驚風之候小兒百病中驚風最急難治故別為條列於此以備預防之道小兒急症既發之後雖有預備之藥不能及時多服則鮮有萬全須令乳母逐日細察兒身如有紅點則必是丹毒之漸考方急治之若兒身過溫於前日或腦後熱口氣熱則必有驚風之候須飲小兒清心丸抱龍丸之屬二方並見下小兒諸驚硃砂雄黃等分調豬油抹兒口中即效入麝香少許為妙小兒生後一朔內多啼乃瀉胎熱不是為病小兒生才二三月早為起動或直坐或高舉則精神眩倒多發驚風天麻五分人參三分煎水和硃砂末服之或泄痢白殭蠶砂仁黃連甘草等分煎服為妙小兒聽旁人疾聲而驚或觸窗戶冷風而驚或冬日冷處之人猝然入房抱之冷風觸兒而驚或小兒入睡之際猝然呼覺而驚或為他兒所踏而驚或為乳母寢時所壓而驚仍發急驚即服安神丸方見下一方麥門冬酸棗仁另炒天麻人參柴胡防風烏藥等分煎服為妙小兒大吐大瀉之餘必發慢驚保元湯方見下加砂仁藿香五六分合服之久哭亦發驚風蘇合香丸服之性躁之兒久哭則氣逆而熱乘痰滯之故也小兒身半隻熱半隻涼者慢驚之候難治錢氏白朮散見下加歸芍各七八分香附烏藥各四五分服之鎮心安神湯亦可用小兒一腮熱而紅一腮冷如水者亦慢驚之候治法上同小兒眼無精氣睜然若驚者必發驚風保元湯加柴胡黃連羌活防風各五六分服之小兒白睛多青色者乃肝熱移肺亦發驚風蓋補金氣旺則木自衰而火自退宜保元湯調瀉青丸方見下服之小兒無端常啼者必是芒刺著膚而然須嚮明窗細察遍身如無著刺處則此必驚風之候清心靈神湯方見下服之加蟬蛻蘇葉各三四分服之尤佳小兒起動負抱之際驚悸而哭者必是護兒不謹腰脊觸傷而然宜細察腰脊如無所傷則項腋肘臂腹際腹內痰核流注或不仁或筋縮或疼痛痰夾熱則不痛成腫之漸隨痰治之若非腫漸則亦驚風之候清心靈神湯加烏藥枳殼各三四分服之小兒頭宜冷足宜溫如有嘔吐或泄瀉或引飲或腹脹或有眼青白之症則必先審其頭足若頭熱足冷則此乃脾虛之致急用補脾益黃湯方見下加全蠍一枚為妙蓋小兒善脫覆繃足易出外頭不熱則不必以足冷為慮古人治急驚以牛黃龍腦硃砂寒水石等材為劑今多用之有捷效十生七八而或有復發成癇者蓋氣依於陽陽依於熱而上材性味甚寒暴絶小兒之熱故元陽清明之氣亦隨而減損邪氣潛伏於其間久乃復發趁其胎熱未肆之前以和平之劑鎮心安神丸之屬預備可也又曰古人治慢驚慢腮以大附子白附子南星蜈蚣等材為劑今多用而幸得不死十保二三而終不免為喪性愚癡之兒蓋上材有大毒雖藉其毒治其病而亦能耗損真氣戕害本性故小兒精魂減少而漸至成癲豈不惜哉宜預為調治以和平之劑而勿用毒材為可丹毒之候一名赤遊風小兒頭面背腹手足或有紅點者乃丹毒之候紅暈蔓延最疾者火丹也紅暈上生赤腫或如粟米或如癮疹或如癬疥蔓延差緩者風丹也治同隨赤色暈處以三稜針亂刺出毒血一日二三次棄血如糞五福化毒丹犀角消毒飲二方並見下並主之一方白清塗楸葉葉乾則浸水用之頻敷之善消紅色一方芥子爛搗作餅敷紅暈邊則毒氣不得外肆蔓延一方生栗留內皮磨於父溺塗之一方豆腐炙於火上敷之一方下針後生豬肉作片敷之又生狗皮乘溫敷之小兒胎瘡膿破後不即完合瘡邊有赤色者多發火丹治法上同小兒面部猝浮色白如常漸為蔓延成瘡如癬疥者亦丹毒之類俗名曰白丹毒治法上同腹痛之候小兒之病最多腹痛一二歲兒未語者有腹痛則必悲啼汗出轉身亙腹坐臥不定頻顧下腹時止時作者熱腹痛也導赤散方見下加軟芩五分服之小兒未著褲之前善脫覆繃腹部犯風或觸冷則外寒逼身亦發腹痛服參茶四五分如無人參則茴香酒炒乳香香附子等分煎服小兒或處冷窔或處濕地腹痛吐乳或噫甚治法上同小兒夜啼有四一曰寒二曰熱三曰口瘡重舌四曰客忤也下夜半曲腰而啼口有冷氣者寒腹痛六神散方見下主之上夜半仰身而啼有汗身熱者熱腹痛導赤散主之口到乳上不能吮而即啼者口瘡雞卵四五個和白清服之立效重舌以針亂刺兩邊出血勿犯中縫一方蒲黃炒和白清頻塗最妙犯客忤或觸外人氣忤而啼黃昏時尤甚者乃容忤中惡也蘇合丸主之小兒吮乳後即發腹痛者蓋以乳母多胃熱故也乳母宜服石膏平胃散方見下乳母過食油膩生冷之物則兒亦發腹痛吐乳泄痢乳母於平胃散加肉桂乾薑枳殼黃柏各五大分服之腹痛立愈小兒環臍痛不可忍名曰盤腸內吊乳香散方見下主之雜證小兒乳後不宜與食食後不宜哺乳乳食相併則難以消下癖積疳塊皆自此始消食散主之方見下小兒常流清涎者名曰滯頤乃胃有蛔蟲之漸苦楝根湯方見下主之小兒變蒸即益精神長知覺之候其證或汗或吐煩啼微驚與傷寒相似輕者五六日重者七八日治法宜用和平之劑惺惺散方見下主之小兒乍有寒氣身熱昏睡頭汗微發或間日或逐日如是者乃瘧母之候柴胡清肝湯方見下主之小兒未斷乳前母有娠則乳兒黃瘦有病如瘧痢名曰鬾病紅紗袋盛夜明砂令兒佩之一方蝙蝠燒灰細研令兒粥飲調下三分日三四次為妙小兒形瘦腹飽青絡滿腹乃脾疳之證肥兒丸方見下主之小兒頸項手足強亙不屈或無氣不仁者乃觸風傷濕氣血壅滯而然終為中風可慮宜急治之下部猝然無氣坐地不遷乃中濕而然六味丸方見下主之小兒足趾相疊乃風漸各隨經治之第一拇趾屬肝脾第二趾屬胃第三趾屬腎第四趾屬膽第五趾屬膀胱假如肝脾所屬之趾疊於胃趾則宜用肝脾治風濕之劑針治恐損元氣且氣弱不能引經祛風湯主之方見下小兒性喜用刀多傷手指血或過出絡血行指時致傷則血出不止急以大黃爛搗敷之一方藥艾爛搗敷之一方馬通敷之血竭尤妙小兒跌僕致傷面部鼻唇血出不止治宜上同小兒肺熱鼻衄以蕪艾塞鼻孔冷水滴腦後血止為度一方蒲黃微炒一錢許和山梔子研干汁炒二錢煎湯飲下立止九竅出血亦宜服此小兒腫處或刀傷處干無水氣宜頻察傷處身冷氣不平者乃破傷風之候急以新放人糞厚覆傷處艾灸其上以當處出水為度一方煎紫檀香和蜜溫服一方黃蠟入清酒煎服一方蜷汁極效小兒外腎皮腐破而脫只懸雙睪子者乃濕處所傷以白早米粉塗睪子以青荷葉裹之則皮生如舊小兒外腎無睪子者乃疝氣上升睪子隨而入腹之故茴香研豬膽汁拌炒川楝肉炒烏藥去皮心酒浸洗等分作丸服之為妙㿗疝灸築賓穴在腎經內踝上三寸甚妙一二歲三四壯四歲五壯小兒傷處未及生肌輕先皮合如常者亦犯風之致追後或痛或不仁轉為風脾之證宜預服疏風湯方見下又以針裂破前傷處雄黃炒鹽作餅敷之小兒外腎肛門大股內側多汗濕且常漬糞尿汁鮮有干時故常有赤色因此發胎毒丹毒或腐傷成瘡皆可慮須頻頻細察洗以溫水俾無濕氣為妙但勿使久坐湯水之中且水溫風冷內滲變成搐搦症可慮洗兒水中入豬膽汁煎之則不生瘡疥小兒㿗疝外腎如鵝卵大俗稱王閬碧梧桐皮濃煎溫洗疝氣自消如常痢疾亦然壯者王閬亦效云小兒陰莖縮入取硫黃吳茱萸各五錢為末大蒜汁調塗臍腹上仍以蛇床子燒煙微熏之小兒陽頭猝浮外皮腐傷者亦濕熱所傷蛇床子煎水頻洗之塗雞子黃油最效又蚯蚓糞調蔥涎塗之亦妙小兒陰莖腐傷內消難治膽礬黎蘆黃丹孩兒茶等分為末和清塗之生肌壯老人病亦效一方塗蛇膽亦效一方萵苣莖木通枳殼黃菊沙等分作末和清敷之神效諸無名惡瘡皆效也小兒初生肛門皮塞者以鍮針或金玉簪尖穿孔蘇合丸作鋌納孔中勿令再合小兒放尿時痛不堪忍淋瀝不善出者乃陽甲孔小而然常以手按引陽頭皮則自然孔闊否則以針裂之無妨若非孔小則乃淋疾之候鵲腦髓五六個和木通去節茶空心連服三四次奇效小兒大便不通乃熱甚便燥而然飲香油數匙許一日三四次腸潤則尿下日寒時香油去冷服之色白商陸長五六分許插入肛門則亦引糞而下一方硃砂水飛和清服之即通小便不通亦由濕熱雍滯蒜餅敷之臍中即通一方大蔥白一寸四破之以乳汁同煎沙石器灌入口中即效小兒虛熱泛上口內糜爛或生瘡枯礬黃柏作末和清摻之或齒疳先以白鹽手擦腐傷處出毒血次以人中白黃柏末摻之以瘥為度鼻孔內外唇上舌下或上齶猝有浮氣仍為腐傷皆是疳類治宜上同一方柏木皮削如馬蹄灸於火待其脂出烙腐傷處極效一方土鼠乾肉作末和清塗之為妙一方蛇膽塗之一方寒水石白鹽和清塗之亦效小兒懸雍垂不能吮乳白清和鹽摻之小兒咽喉浮痛或爛傷玄參桔梗甘草各七八分煎服之兩耳尖灸三壯神效長老人病亦效小兒臍封犯風或爛瘡或猝浮突起名曰旋螺荊芥穗艾葉同煎頻洗之王不留行燒存性父脫鱗並調蠟油塗之小兒斷臍防風且無腹痛一方石雄黃乳香和香油塗之妙臍封爛瘡滅瘢膏塗之奇效方見下小兒傷於風寒失音聲嘶久而不瘥多服清音散方見下以瘥為度小兒斷臍後和麵作餅圍臍裹之艾灸三壯防臍風小兒喉痰有聲者乃氣虛痰將為癖積或痰厥人參黃連貝母甘草各二三分煎服或加玄胡索肥兒丸亦主之小兒處過溫之壤則血燥損元面色萎黃昏睡無氣升葛湯葛根二錢升麻白芍藥各一錢甘草五分加當歸身一錢人參三分服之以解肌熱兼補津液為妙小兒觸暑昏倒急取路中熱土和童便去滓灌口絞腸腹痛治上同暑感寒熱症涉危重小柴胡湯為妙暑傷諸症生脈散主之麥門冬去心三錢人參一錢五味子九粒研用小兒兩目猝浮不能開見濁汁流出乃傷於濕熱而然瀉青丸加貝母草決明各三四分人參桑白皮各二三分作湯服之小兒遊戲眼被撞刺血痕疼痛仍生翳膜刮取水青木皮浸水去冷頻頻洗之黃連煎水調初男乳白芍藥乳尤效寢時入眼兼服輕咳散方見下小兒眼胞猝浮大如拳眼睛亦凸然突出者乃脾胃濕熱上升結核之致平胃散加石膏草決明各七八分或人參三分服之小兒鼻塞不通乳不得下取豬牙皂角草烏薑製等分為末調蔥涎作膏貼囟門上一方南星末調薑汁敷囟門上鼻孔生息肉者肺熱上星穴在前頂髮際上一寸灸五壯或七壯一方巴豆去油作末裹紙如管形插入鼻孔稍久黃水流出以水盡為度則鼻通肉消巴豆甚毒勿令其屑襯鼻內肌濁汁恆流者名曰鼻淵乃腦消之候治法上同兼用防風湯方見下或流清涕者亦同治小兒聤耳濃汁恆流久而不瘥成聾難治生銀杏作汁滴入耳孔干銀杏磨醋香油略入麝香末為妙一方干胭脂或綿胭脂調鯉魚膽滴入亦妙防風通聖散方見下加減服之奇效小兒未經痘疹之時癮疹數發者乃表熱夾風濕而然預服升葛湯方見上以防行痘時添重之患斑疹熱毒甚而然加連翹防風牛蒡子各五六分白色疹氣虛熱多而然加羌活蒼朮人參各五六分小兒移去他處水土擾腸痰飲猝盛轉成痰積痰厥可慮薏苡仁桔梗白茯苓貝母等分入乾干少許作茶和清常常服之一方生槐木上自生耳煎服治土疾最效小兒誤吞牟稻尾刺飲鵝涎或狗涎鵝與狗一足縛繩倒懸則涎自流出魚刺著口內魚網罨口而飲水則刺自下又魚網燒存性和水服之刺著項內難拔生薑搗作餅微焙尉於刺著邊項外餅冷改焙敷之刺自聳出刺著手足深入難出榛子去殼搗作餅敷於刺著處對衝刺自聳出誤敷刺入處則刺入益深刺著手足及肌膚薔薇根濃煎沉刺著處刺自聳出如或刺著足底而上煎水過多沉沒足趺則刺聳出足背須如榛子敷法如鉛鐵等刺入肌亦然一方石花敷對衝如榛子法針入肌不可拔指南石敷之則自然引出一方螳螂爛搗略入麝香末敷之蓋螳螂前引者敷針入當處後推者敷對衝為妙小兒耳孔蟲入以竹管插入耳孔用力吸之蟲自出矣一方滴入香油蟲即死括出之豆太入耳孔繩頭摻明膠汁插耳孔良久出之物自附出小兒為他兒所咬龜板或鱉甲燒存性和香油塗咬處一方黏飯敷之狂犬咬處初灸七壯後日灸一壯至百壯一方虎骨作末調酒服之一方斑貓去頭翅足炒作末和溫酒男子則自背後越肩受其酒飲之毒物從大便出若自前直受而飲之則毒物從小便出痛不堪蓋毒物者狂犬毒氣自成物形也一方葛根二三錢杏仁七八分煎服之貓咬薄荷嚼敷之蛇咬以針亂刺咬處逐日出毒血以瘥為度一方豬肉敷咬處兼食之一方貝母木香各一二錢石雄黃三四分並作末調酒服之蜈蚣咬生雞肉敷之咬處一方獨頭蒜敷之一方付生蜘蛛咬之吸去其毒蜂螫醋滓或薄荷汁塗之蛇入鼻口中火燒其尾則蛇驚出一方薑汁擦貓鼻則必放尿滴於蛇入孔中則自出小兒誤食諸果諸菜或躑躅花中毒香油多飲之一方甘草黑豆煎服之一方人糞多飲之誤食草烏治方上同一方鴟羽煮於香油服半盞即效牛肉毒尤驗焉痘疹鴟張時令小兒預服稀痘兔紅丸人參敗毒散並見下方以防危重難救之患竊觀牛黃抱龍丸乃小兒百病之良劑火丹驚風未瘥之前連服無妨而未及生病之前為其預防一二月之內過服七八丸則腸胃暴冷寒痰猝盛甚危須人參白朮貝母肉桂各三四分服之為可經曰大火食氣又曰火與元氣不兩立一勝則一負凡小兒之病專出於火熱而一線脆弱之氣不能抵當其消鑠何能免其為火之所食大火食氣氣食大小而亦望其兩立一勝哉苟非一味參力補虛回元之功萬萬無撥亂反正之勢矣或曰人參助熱熱症不可用此意稽之言也經曰熱雖甚不死注曰氣盡而死然則凡熱病至死者非熱甚而死也乃氣盡而死也蓋金旺土中則木自衰而火自退矣保養小兒之家須以人參為瞽者之相而察其虛實酌量用之可也三關脈法小兒食指男左女右第一節風關第二節氣關第三節命關一線紅紋至初節可治二節難治三節不治風關無脈則無病脈見則病輕氣關脈見則病重命關脈見則病欲九死一生風關氣關有赤紋者心病牛黃抱龍丸主之青紋者肝病瀉青丸主之白紋者肺病保元湯主之黃紋者脾病保脾益真湯主之黑紋者腎病不治觀形察色法小兒左腮屬肝右腮屬肺天庭屬心地閣屬腎準頭屬脾凡五嶽赤者熱人參茶三四分調牛黃抱龍丸服之淡白者皆虛保元湯主之天庭紅大熱人參茶三四分調牛黃抱龍丸服之青主風保元湯調瀉青丸服之印堂兩眉間青者人驚清心靈神湯加草龍膽酸棗仁炒各五分服之紅白者水火驚清心靈神湯加酸棗仁炒遠志肉蓯蓉益智仁各五六分服之紅者痰熱膽星抱龍丸主之印堂連準頭紅者三焦熱積牛黃抱龍丸人參茶調印堂至山根兩目間紅者心小腸熱鎮心安神湯合導赤散材服之山根至鼻柱紅者心胃熱鎮心安神湯加石膏一錢服之唇屬脾唇紅色熱痰保元湯加黃連貝母硃砂五六分服之青色驚風保元湯合瀉青丸材服之黑色中惡蘇合丸主之黃色傷食吐痢消食丸主之白色虛甚保元湯主之左太陽頭額角也青色驚小兒清心丸主之紅色傷寒惺惺散主之青黑色乳積消食丸主之右太陽青色驚保元湯合瀉青丸材服之紅色風搐治上同聽聲音法聲音輕清者氣也弱也保元湯主之重濁者痛也風也惺惺散主之濁而沉靜者疳積也消食丸主之聲急者神驚也鎮心安神湯主之聲塞者痰也膽星抱龍丸主之聲戰者寒也惺惺散主之聲噎者氣不順也蘇合丸主之聲喘者氣促也保元湯加貝母杏仁黃連香附子各五分服之高喊者熱也小兒清心丸主之噴嚏者傷風也惺惺散加柴胡防風各五六分服之猝然語訥者風中舌本也加減養榮湯加細辛犀角石菖蒲各四五分服之猝然驚叫者火動氣虛也難治人參七八分煎茶調牛黃抱龍丸服之胎熱小兒心弱神不固守故熱夾風痰而肆其毒若心實神安則無生患加減鎮心安神湯此二劑安心止驚散邪合二丸材加減作湯以為清補心經預防驚風之候而凡慢驚發於虛熱則性寒之材恐無益而反有害故今姑減之隨症加入麥門冬去心山藥浸礬水各七分白茯苓茯神尤緊酸棗仁去皮尖研另炒各五分大補心肝氣血人參三分半虛則入四五分甘草半生半炙二分半硃砂水飛二分半此材性寒不可久服宜代入黃連姜炒或山梔子研酒炒五分可麝香一字一方以白芍藥為使養血而云白芍能發生發之氣宜酒浸另炒入五分服之久服則入當歸身酒洗五分或紅花酒洗一二分以養心血可也如胎熱甚加連翹牛蒡子研酒炒防風各五分如心熱口中氣溫或合面臥及眼上竄額赤搖頭咬牙或舌乾舌苔舌腫加生地此材損胃宜藥汁另炒木通去節各五分或合導赤散從小便以瀉熱可也黃連姜炒三分如肝熱手尋衣領亂捻物眼黑左腮赤加柴胡防風各五分熱甚加草龍膽酒洗三分青皮二分半如脾熱面黃肚大怠惰嗜臥身熱飲水唇焦鼻赤加山梔子姜炒防風各五分熱甚倍入人參中氣實邪熱退加石膏煅三分藿香酒洗三分或合瀉黃散以瀉熱如肺熱咳嗽寒熱肚熱水飲喘悶鼻乾右腮赤加山梔研蜜炒貝母去心乾製各五分熱甚倍入人參加桑白皮蜜炙二分半性峻不可久服如腎熱目下竄畏明頦赤色加生地乾炒五分乾薑炒黑一分半熱甚加肉桂三分黃柏酒炒黑一分半干桂二味引腎火歸源如大腸熱右鼻孔干痛加大黃酒煨芒硝各三分此二味性峻不可久用如小腸熱下唇焦加赤茯苓生地乾炒各五分如胃熱舌下痛加石膏煅七分如膽熱眼色白加草龍膽酒洗柴胡酒洗各五分如筋熱甲焦加川芎當歸身酒洗各五分如血熱發焦加當歸身酒洗生地酒洗五分桂心一分半如氣熱鼻孔喘促倍入人參加山梔酒炒軟黃芩酒炒各五分如潮熱似潮有信應時而發過時即止加連翹前胡木通去節各五分如骨蒸肌瘦頰赤口乾潮熱盜汗五心煩躁加寒水石煅地骨皮酒炒各五分如痰熱面赤身熱咳喘胸膈不利喉間有痰聲加貝母乾製杏仁去心尖各五分痰甚倍入人參氣虛則痰甚故也加膽星五分烏藥酒洗去心皮各三分如瘧熱寒熱往來一日一發二三日一發加柴胡蜜炙草果面炮煨各五分有瘧母加玄胡索醋炒三分檳榔研二分半如風寒熱發熱不歇身熱口氣熱呵缺鼻塞加柴胡五分羌活三分傷寒無汗倍入柴胡加蘇葉二分半傷寒有汗加防風五分汗甚加生黃耆五分如上熱遍身發熱不已甚則發驚搐加寒水石五分馬牙硝三分如寒熱身熱喜飲水大小便祕澀去人參加大黃酒煨五分馬牙硝三分如虛熱身熱不飲水大小便如常倍入人參加柴胡五分蜜炙則補虛地骨皮酒炒三分如遍身胎腫腫熱加連翹牛蒡子酒炒荊芥穗各五分如預防痘疹熱加葛根升麻連翹牛黃子酒炒各五分紫草茸三分如腦後遍熱而遍身如常者虛熱泛上而然加當歸身酒洗白芍藥酒炒各五分肉桂乾薑炒各二分半干桂二味引虛火歸源乾薑炒黑則且生陰分血黃柏酒炒一分半如頭熱或陽而足冷者脾風之候加丁香天花粉各五分桂皮三分附子炮製一分附桂二味引陽氣下行足部如左腮熱而右腮冷者肝虛夾火脾虛夾痰而然加黃耆蜜炙阿膠各五分二味俱補肝肺膽星草龍膽酒洗烏藥去皮心酒洗各三分如右腮熱而左腮冷者肺虛夾火脾虛夾痰而然加黃耆蜜炙阿膠各五分貝母去心乾製山梔子炒黑川芎烏藥去皮心酒洗各三分如身半隻熱半隻冷者痰火鬱滯氣血不行陰陽不調之致倍入人參加膽星白殭蠶去觜乾炒各五分全蠍去頭翅足及腹中土姜炒另烏藥去皮心酒洗各三分附子炮製分半如嘔吐乳食脾胃熱加藿香酒洗砂仁碎炒各三分甚則考嘔吐門治之余仿此如赤痢熱入血分加白芍藥酒炒五分清血熱厚朴乾炒桃仁去心尖研各三分如白痢熱入氣分加砂仁碎炒陳皮各三分厚朴乾炒二分半如泄瀉冷熱交攻加砂仁碎炒木香炮肉豆蔻以紙去油酸調麵煨各三分急驚此證得於熱甚夾外感風寒或因物驚悖而發驚風發搐不可把捉其手足只當任其風力遍行經絡熱極自止不至傷人清心靈神湯治急驚及諸熱驚合膏丸作湯小兒時時有驚也宜服此以祛心肝之邪麥門冬去心七分白茯神五分人參二分半柴胡蜜炙防風各五分硃砂水飛二分半性寒不可久服代入黃連酒砂三分為可麝香一字如聞大聲而驚此無陰也宜下之加黑醜頭末虛則不可用木通去節各五分恐是膽氣不足草龍膽酒洗益智仁去殼鹽水炒各五分如見奇怪物象而驚此心弱神虛也當歸身酒洗酸棗仁去皮尖另炒各五分紅花酒洗一分半如觸風而驚此夾外感也倍入柴胡加葛根前胡各五分羌活甘草炙各三分如觸冷氣而驚肺居五臟之上先受其傷氣縮熱結加生黃耆五分升麻蘇葉各三分乾薑炒一分半或二分如因踏與壓而驚血氣驚滯而不行加酸棗仁去皮尖研炒五分烏藥去皮心酒洗三分桂皮二分半此材能通血脈如人驚恐是氣不足倍入人參加酸棗仁另炒七分草龍膽酒洗五分如火驚恐是神不足倍入硃砂加當歸身酒洗酸棗仁另炒各五分遠志去骨乾炒三分紅花酒洗一分半如水驚恐是精不足倍入人參益肺氣則金生水故也加茱萸酒蒸去核五分肉蓯蓉酒浸去甲益智仁去殼鹽炒各三分如高舉恍惚而驚加天麻去粗皮酸棗仁另炒各五分白殭蠶去觜姜炒三分如睡中驚魘常恐畏不寧加酸棗仁另炒熟地姜炒五分以防損胃益智仁鹽炒三分如痰盛如引鋸喘加膽星貝母去心乾製各五分烏藥去皮心酒洗三分氣順則痰化而搐自止先以蘇合丸調薄荷湯灌下一二丸後繼服此劑亦妙如驚搐痰喘窒塞至死加膽星天麻各五分白殭蠶乾炒二分全蠍去頭翅足腹中土乾炒二分半如竄視涎潮加膽星橘紅各五分木香三分全蠍乾炒一枚凡小兒之生理本天一生水之妙如治胎熱丹毒驚風痰熱變蒸發熱嘔吐瀉痢之症以水道通利為捷徑所以清心利小便而散火也倍入人參加燈心赤茯苓各三分豬苓澤瀉各二分半天乙丸亦主之方見下余仿此如諸熱驚清心丸主之柴胡防風白茯神人參硃砂等分作丸金箔衣如邪熱急驚小兒安神丸主之大安神丸方見下如肝熱急驚瀉青丸主之如眩暈昏昧恍惚保命丹主之如氣鬱痰搐膽星抱龍丸主之方見下驚風危急難救兩乳頭各灸三壯百會上星穴在前髮際上一寸一方兩眉間灸三壯神效凡驚風專是心火肝風交爭血亂氣並痰涎壅塞開竅不通而無所泄故暴烈竄搐及其發定後了了如故者急驚也綿綿不止者慢驚也宜考下慢驚治之開關散治急慢驚噤不開蜈蚣一條金頭赤足者可用酒浸炙白殭蠶去觜乾炒南星炮乾製各一錢射香一字豬牙皂角各三挺略燒存性上為末以手點薑汁蘸藥少許擦牙或用物引滴入藥二三點於口中涎出開關竊觀此劑雖入毒材不可多飲之藥然小兒有此症施之無妨小兒能全純陽之氣而未破陰故雖服毒劑少許不至大損故也小兒口噤然谷穴在內踝前直下一寸大骨下灸三壯神效牛黃抱龍丸膽星抱龍丸加牛黃珍珠琥珀金箔四味名曰牛抱小兒百病之良方急慢驚未分宜用此先鎮之抱者保也龍者肝也肝為母心為子母安則子安況心臟神肝臟魂神魂內守驚何徒生膽星一兩天竺五錢黃雄黃辰砂水飛各二錢半麝香珍珠琥珀各一錢牛黃五分金箔十片甘草煎膏和丸芡實大金箔為衣半歲兒一丸三分服三歲兒一丸薄荷湯下此劑鎮驚退熱化痰之妙方但恐性味極寒專無補元之力不可多服如退熱勢大盛不得已而用之則人參二三分作茶調下無妨驚止如常後宜移用補脾調理之劑如補元湯之類大抵驚風乃心火肝風脾痰三家之病而金旺於土中則木自衰火自退而不得交爭故方云大病後調理脾胃醫家之王道斯言至矣牛黃抱龍丸稀貴非鄉鄙之所可易得人參貝母白殭蠶防風酸棗仁硃砂牛黃七味等分作散薄荷湯和清服下則功效之捷不減上丸竊觀俗人徒知貴材之治危症而殊不知性味至寒之藥峻攻壯熱使熱邪不得肆其毒於外而反為縮藏於內故服良劑之後了了然如故仍謂之痊可置之尋常及其乘內虛而夾外感復發植則根固而治之尤難急驚變為癇慢驚變為癲養幼之家可不戒懼也哉截風丸治急驚慢驚痰搐及急驚變成慢驚等症宜用此截之天麻白殭蠶去觜乾炒蜈蚣一條白附子炮製依本草去防風硃砂全蠍乾炒各一錢麝香一字上蜜丸梧桐子大薄荷湯調下此劑止驚化痰截風之要藥但多入毒材病雖服此減歇而其奈戕性損元何須去蜈蚣且減白附子五分去南星而代入貝母加人參二錢雄黃五分制之可也大安神丸治急慢驚安神定驚又能治心熱夜啼酸棗仁去皮研粉炒甘草炙各五分白殭蠶桔梗尾各一錢二分半人參赤茯苓白朮硃砂麥門冬去心木香代赭石醋煮各二錢半此方真品難得代入雄黃一錢亦可全蠍姜炒三枚金銀箔各三片上蜜丸梧子大金銀箔為衣薄荷湯化下一二丸此劑性味和平且兼補瀉驚風新瘥後作丸或作湯常常服之可也慢驚此證得於火病之餘大吐大瀉之餘過服涼劑之餘面色青白手足瘛瘲渾身四肢厥冷默默不聲大小便青白或眼半開半合漸成脾風之候十指或開或合急驚持久不瘥多服涼劑脾胃虛冷轉成慢驚者多治之尤難矣錢氏白朮散治吐瀉日久不止津液枯竭引飲欲成慢驚此劑性味和平治慢驚之緊方葛根補津液二錢人參白朮白茯苓木香藿香甘草各一錢如泄瀉不止加山藥白扁豆炒肉豆蔻醋調麵包煨後以紙去油各五分砂仁碎炒三分大瀉之餘中氣下陷宜升提之加升麻柴胡並酒洗各三分如嘔吐不止加丁香砂仁炒各五分大吐之餘宜順氣加烏藥去皮心酒洗三分如津液枯竭加天門冬去心七分棗肉五分如引飲加天花粉七分如慢驚已成加天麻五分細辛二分半白附子炮製一分半全蠍姜炒一枚如大病餘氣虛而倍入人參加黃耆一錢如過服涼劑而發倍入人參加肉豆蔻炮製七分肉桂三分炒二分半如虛熱加麥門冬去心一錢前胡七分硃砂二分半如面色青白倍入人參加草龍膽前胡防風各七分如渾身四肢冷倍入人參加蒼朮桂枝各五分如大小便青白加柴胡山梔子炒黑草龍膽防風各五分凡瀉青大禁涼麵此方專是補肝故此方加四味以疏肝木邪氣如眼半開半合轉成脾風之候加丁香肉豆蔻炮製天麻白殭蠶姜炒各五分白附子炮製一分半全蠍姜炒一枚如十指開合加膽星天麻白殭蠶防風各五分全蠍薄桂各三分竹瀝薑汁各半匙如大拇指偏為開合倍入人參加黃耆蜜炙一錢膽星白殭蠶姜炒各七分川烏炮製二分半難治如八候俱見倍入人參合化風丹調下竊觀慢驚多因吐瀉不止津液枯竭而發則白朮散專補𧣪邊而只以葛根一味生津恐太緩古方云以白芍藥加於保元湯為使養血而相依補血則風自除而火自降須加歸芍二味以滋脾胃之枯竭且以丁香砂仁二味收拾泄逆之氣似可爾保元湯治便色青黑大便泄青乃慢驚之惡候急用此劑預防為可凡瀉青乃風木剋土之致先補脾土使土中金旺則木自衰火自退矣蓋氣實則火退者氣食小大也土實則木衰者脾旺不受制於肝而金來剋木故也黃耆蜜炙二錢人參一錢甘草炙五分此方專主補脾故以黃耆二錢為君白朮散專主生津故以葛根二錢為君兩意皆好用者宜變通加減為妙一方以白芍藥酒炒五分為使養血為妙如大便黑色加生地乾炒一錢肉桂玄參酒炒各五分黃柏酒炒黑二分半如眼無精光睜然若驚加柴胡蜜炙五分前胡山梔酒炒熟地乾炒山茱萸酒蒸防風益智仁鹽水炒各五分如白睛多青色加山藥天門冬去心阿膠珠柴胡蜜炒防風各五分青皮二分半旺肺氣則肝木自衰如因吐瀉轉成慢驚半陰半陽症加陳皮一錢白芍藥酒炒七分白茯苓四分黃連二分名曰益黃散如因吐瀉不止脾胃昏沉默默不聲去黃耆加白朮白茯苓白附子炮製白殭蠶乾炒天麻木香各五分全蠍乾炒二分半干三棗二名曰醒脾散如吐不止加砂仁炒藿香酒洗各五分如瀉不止加砂仁炒七分升麻三分慢驚危急之證材煩則效遲況脾中氣旺則木衰火退宜先用補元湯二三帖以扶真元可也奪命散此方不問急慢驚痰塞咽喉其響如潮百藥不能過咽命在須臾但用此藥入喉痰即墜下功收萬全奪天地之造化青礞石焰硝各一兩上二味入鍋內火煅待焇焇盡候礞石如金色取用細末薄荷汁入蜜微溫服之黑痰墜下從大便出繼用治驚之劑礞石雖利於痰非胃家所好加木香二錢佐之一方痰塞喉門而搐蘇合丸調薄荷湯入薑汁少許灌下或香油和下痰因氣鬱而上升氣順則痰化而搐自止故也小兒時令咳喘痰盛服蘇合丸則或吐痰或下大便人參二三分作茶和下最妙保幼化風丹治急慢驚八候俱見南星半夏川烏白附子各一兩鬱金五錢上併為末入臘月黃牛膽內陰乾百日取藥研為末每一兩入牛黃硃砂硼砂焰硝各一錢片腦麝香各少許上共為末蜜丸豌豆大燈心薄荷湯研下和一二丸此劑甚毒不可輕用然驚風八候俱見之後難望其生全第用此方鎮定回蘇後即用補元調理之劑亦一道耳備急丸治急驚又同治慢驚五月五日取白頸蚯蚓不拘多少去泥後焙乾為末加硃砂等分糊丸緑豆大金箔為衣白沸湯下一丸此方以竹刀中繼蚯蚓取急跳者治急驚取慢跳者治慢驚神效慢脾風此證由慢驚後吐瀉損脾病傳已極總歸虛處惟脾所受故曰脾風若逐風則無風可逐療驚則無驚可療但脾間痰涎凝滯虛熱往來其眼合者乃脾益困氣之神迷之補脾益真湯此大補脾胃虛損之聖劑丁香木香訶子皮陳皮厚朴姜炒草果麵包煨肉豆蔻炮製白茯苓人參白朮桂枝半夏炮乾炒甘草炙各二分全蠍一枚干二棗一服訖令標心下以助藥力凡小兒脾風之候見上脾風有五症條宜預服此劑天吊此證亦驚風之類但天吊發時頭目仰視驚風則無也小兒瘛瘲不定翻眼戴睛狀若神祟頭目仰視手足抽掣如魚之上鉤故亦曰天釣甚者爪甲青宜服蘇合丸如由乳母過食熱毒物心肺生熱加以外感風邪所致則鉤藤散主之熱勝則保命丹主之痰盛則膽星抱龍丸主之鉤藤散名曰鉤藤散而不入鉤藤恐或有闕也人參犀角各五分全蠍天麻各二分甘草一分一方有鉤藤一味客忤小兒神氣軟弱忽有非常之物未識見之人觸之或見神廟佛寺神氣相忤其狀口吐青黃白沫或下水穀解雜面變五色腹痛反側瘛瘲如驚癇但眼不上竄即以蘇合丸薑湯調下頻服次服雄黃散兼敷黃土散雄黃散雄黃一錢乳香五分麝香一字每一字刺雄雞冠血調下仍以母衣覆兒身即愈黃土散伏龍肝蚯蚓糞等分細研水調塗頭上及五心最良一方熊膽雄黃烏藥治注忤鬼氣三味合服單服亦可如中馬汗氣馬鳴驚忤取馬尾燒煙熏兒面以瘥為度一方客忤故汗衣燒灰每二錢白沸湯調下男用女衣女用男衣中惡此證其狀猝然心腹刺痛悶亂欲死人中青黑即服蘇合丸未醒以皂角末吹鼻兼用辟邪膏辟邪膏降真香白膠香沉香虎頭骨人參鬼箭羽草龍膽雄黃各五分麝香一字上為末爛蜜作膏取少許乳香湯調下兒口中又令兒帶之及燒臥內尤效一方故汗衣燒灰二錢白沸湯調下一方以唾和麝香一錢研和醋一合服之即瘥一方白檀香或紫檀香煎服為好一方中惡心腹痛雄黃硃砂等分研為末烏藥煎湯調下尸厥蘇合丸研香油灌下灸巨闕七壯痓痙身軟時醒者癇強直不時醒者痓此症亦驚風之類痓者手足冰冷痙者舉體強直本是一病當以陰柔陽強別之強者有汗柔者無汗其狀肢體強直腰身反張甚於風癇大抵不治參歸養榮湯治風痰痓陰痙也人參當歸川芎白芍藥酒炒熟地姜炒白朮白茯神陳皮去白各一錢甘草五分干三棗二栝蔞枳實湯治痰火痓栝蔞仁去油枳實麩炒貝母去心乾製桔梗片芩酒炒陳皮山梔子姜炒白茯苓人參當歸蘇子炒各七分甘草三分竹瀝薑汁各一匕調下角弓反張灸百會七壯此症切不可作風治宜以虛實分治為可癇此症乃天刑之疾醫者治之或傳染或反受殃大風瘡亦然驚風三次復發則為癇發時仆地作聲醒時吐涎沫過後便惺惺清心溫痰湯此劑平肝解鬱清火化痰也當歸身一錢人參五分白茯苓陳皮半夏曲白朮白芍藥酒炒香附子便炒麥門冬去心各七分竹茹黃連乾炒川芎枳實麩炒此材治痰有沖牆倒壁之力遠志乾炒石菖蒲各五分此劑一名二方今取性味和平之劑而但膽星勝於半夏曲酸棗仁勝於麥門冬用者宜變通加減可也白殭蠶全蠍尤妙癇病方萌耳後高骨間必有青紋紛紛如線見之急用抓破須令血出啼叫尤得氣通易效一方黑質白腸大蛇作鱠或脯久服奇效一方久患此症者震死牛馬肉食有效已驗一方黑獖豬心以竹刀劈開入九節菖蒲末煮湯每日空心送下二三錢神效一方胎癇奶癇驚癇灸鬼眼四穴穴在拇指爪甲上兩角如韭葉各三壯此治邪祟之要穴也癲狂罷倦無力者癲強健有力者狂癲為心血不足狂為痰火實盛竊觀癇者發時雖似驚風而過後了了如常癲者喪失本性多喜癡笑狂者或歌或哭奔走無定入門云十歲以下為癇十歲以上為癲此指癇變為癲而言寧心化痰湯治癲狂初起狂可治癲不治膽星半夏炮乾炒陳皮赤茯苓黃連姜炒天麻人參酸棗仁另炒石菖蒲各一錢姜一片膽星半夏二味俱入太燥去半夏代入貝母為可先服此劑祛痰後宜繼服養心清血湯養心清血湯當歸身生地乾炒人參白朮白茯苓川芎遠志乾炒酸棗仁另炒石菖蒲各一錢甘草五分癲宜養血安神而兼降痰火宜加蓮肉一錢益智仁鹽炒五分硃砂五分狂宜下之大便宜加大黃酒煨芒硝各一錢如狂言妄語加犀角五分如啼泣狂叫加百合一錢一方癲狂癇多服牛心血有效一方猝狂狂言妄說蠶退紙燒存性一錢許和白沸湯飲下即效一方凡諸熱病發狂三日芒硝三錢雞子清一個生清一匕井花水調飲奇效丹毒此症乃熱毒之氣與血相摶而風升之故遊走遍身名曰赤遊風入腹則死五福化毒丹此方專治疳熱瘡癤丹毒之類也犀角生地桔梗赤茯苓惡實連翹粉甘薄硝玄參各一兩青黛三錢此劑一名二方入人參五錢麝香五分金銀箔各八片每一兩作十二丸一歲兒一丸分四服犀角消毒飲治丹毒斑疹之緊劑牛蒡子研酒炒荊芥穗防風各一錢甘草七分犀角五分此方加連翹白芍藥酒炒紫草茸各七八分尤效如丹毒之氣入里則必發腹脹急以細針亂刺赤暈邊使不得蔓延一日二三次下針針後即敷生豬肉最妙病療後宜服補血之劑以防針治損血之害為可一方針後人糞和醋少許塗之新放人糞一方針後全鰒蛤殼燒作末調醋塗之以瘥為度一方豆腐炙於火上敷之一方丹毒欲發之初生栗留內皮父尿細磨頻塗一方楸葉塗生清敷之葉乾則浸水用之一方真末調陳真醬塗之一方萆麻子磨醋塗之一方雞子黃厚塗後炙虎骨擦之一方三家姓洗皿水洗之一方豬尿洗之木麥調醋作熱餅待冷敷之如面上有浮氣色白如常仍成癬瘡或如櫻桃而內有膿汁者亦丹毒之類俗名曰白丹毒塗雞子黃以虎骨暖擦之如面瘡壞爛無全膚流膿水百藥不效臘豬脂塗之為妙一方白楊枝燒取瀝塗之神效一方面瘡及諸惡瘡滅瘢膏塗之極驗雞矢白鷹矢白衣魚白附子白殭蠶白芷等分為末香油作膏如肌膚自然傷破漸至腐敗生狗皮敷之冷則無效一日二三次改敷極驗如走馬胎熱夾痰而風乘之故流走諸處滯則成膿故曰走馬瘡飛尸骨疽大股內外略有浮氣淺膿曰飛尸外無浮氣深膿曰骨疽以筋縮及當處有熱氣知成膿與否也未膿之前犀角消毒飲加貝母去心乾炒半夏炮乾炒連翹白芍藥酒炒天花粉金銀花各五分乳香沒藥各三分外以南星枯礬白鹽真末薑汁並調作餅敷之此方自仙傳化毒湯透來如走馬飛尸骨疽已膿針破之後犀角消毒飲加貝母半夏連翹白芍藥黃耆白芷皂角刺各五分外以雄黃龍腦白鹽調白狗膽入瘡口一日一次改敷以瘥為度一方未膿已膿蟾膾蛇膾或蟾蛇汁或作脯或作丸皆可服之遍身胎腫小兒遍身生腫如粟米俗亦謂皮風之類不治則腫毒入里成脹也大連翹飲治諸般毒腫甘草四分柴胡軟芩酒炒荊芥穗各三分連翹車前子瞿麥滑石惡實赤芍藥酒炒山梔子酒炒木通去節當歸防風各二分蟬蛻一分半竹葉三片燈心十莖此方治瀉熱妙法從天一生水透出來如癢甚加白蒺藜三分如痛甚加寒水石煅二分半又方加沒藥乳香各二分如肚腹飽滿加蘿蔔子五分厚朴姜炒三分如腫毒入里猝成浮脹宜服消脹散如疔腫斯毒菊葉作汁飲無葉用根又菊葉爛搗敷腫處又方疔腫初生時生薑作片而孔其中敷腫處以石雄末和藥艾細捻之著姜孔而灸之七七壯仍取棗肉敷之謂之姜灸腫毒自消而完合不難若已膿以剪刀剪腫尖仍作姜灸又方生銀杏搗敷腫處又方鼠目大半掬嚼破敷腫處以待痊可如紅絲疔以針亂刺紅絲出毒血後治法上同姜灸則不為亦無妨而不針則姜灸亦可又方人頭垢作片炙火乘溫敷腫處諸毒腫枯礬和涎塗之古方云千方萬藥不如一唾諸惡腫陰蛇皮燒存性和豬脂塗之無豬脂香油可代之久瘡亦有效諸腫癢痛不可堪陰蛇皮去鱗調唾敷之則痛氣立止如神胎腫胎瘡馬胎燒存性作末和油塗之為妙如頭面髮際無名毒腫菖蒲作末調醋塗之如頭瘡壞爛成痂連翹荊芥穗煎湯洗之去其瘡痂秦艽或羌活作末調香油頻塗之如頭疳蓋頭上生腫或如栗子或如胡桃雞卵或硬或軟者疳毒也未膿則南星枯礬作末薑汁並調醋塗之已膿則針破出膿汁後厚敷黏飯一日二次以完合為度否則成蟲流走臟腑侵蝕黃瘦遂至於死詳見疳積門如面腫唇腫背瘡發疽桑蟲汁塗之又方柏木枝炙火待脂出炶烙立效又方柏木公伊作簪插頭久染髮垢者炙火頻擦之尤效湯火瘡生梨汁塗之又方西瓜皮燒存性調香油塗之又方多飲月經使火熱不得內逼又土鼠燒存性調香油塗之至死還生毒腫腐痛白朮爛搗敷之極效久瘡不瘥萵巨莖木通枳殼黃菊沙一名王不留行等分作末和油塗之即效凡惡瘡膿未膿敷母酒於當處極效背瘡及手足浮突將成腫麻仁作餅敷之為妙編瘡多腐肉處敷之亦效小兒放糞於陰瘡人之放糞處則惡氣上染仍成陰瘡裹飯草爛烹洗瘡又飲之曾試有效又稷爛蒸數斗許坐其上熏其暖氣頻頻改之以瘥為度壯者陰瘡亦效瘰癧耳後結核漸至兩腋下或浮突或至爛瘡曰瘰癧或自耳繞項結核曰連珠多是肝火夾痰而成梔子清肝湯山梔子酒炒一錢柴胡川芎當歸白芍藥酒炒連翹各七分桔梗青皮甘草各五分此方加玄參夏枯草各五分又加胡桐淚最是痰解之要藥宜加入不可缺一方昆布調唾敷核上數月餘則核自消散一方瘰癧年久成瘡蜃鹽敷瘡上以瘥為度蛤鹽亦可一方玄參三錢夏枯草二錢煎服逾年則必瘥一方雞卵每朝三個至七八百個服之新增則必效一方黑質白腸蛇鱠多服必效一方凡痰核萵苣莖爛搗敷之為妙癭瘤癭者細而垂肉塊也瘤者圓大如大腫而持久不膿年久後成蟲而膿難治蓋此症多發頤下或項邊破結散治諸癭瘤及瘰癧馬刀馬刀瘡多發頤下海藻酒洗草龍膽酒洗海粉通草貝母去心姜炒昆布酒洗枯礬松羅麥曲半夏各七分此劑忌甘草鯽雞等十六味流氣飲治乳岩瘰瘤馬刀等症馬刀腫形如瓜當歸川芎白芍藥酒洗黃耆人參官桂厚朴姜炒桔梗枳殼麩炒烏藥去皮心酒洗木香檳榔白芷防風紫蘇葉甘草各一錢如痰癭合二陳湯半夏炮乾炒陳皮赤茯苓各七分有一兒頸上生血癭四個如手指狀長數寸許服此劑二十餘帖癭即自枯根斷不復出一方瘰癧癭瘤多服蛇鱠蛇脯奇效腹痛小兒腹痛多是乳食所傷蓋有積則氣不宣通而痛也消食散治食積腹痛白朮陳壁土炒二錢半麥芽炒縮砂炒研山楂肉炒各一錢橘紅無則代入陳皮香附米便炒神麯姜炒青皮各七分甘草五分如氣不足加人參三分如夾熱加白芍藥炒一錢黃連炒五分如夾痰加貝母去心姜炒一錢如夾冷加肉豆蔻炮去油五分乾薑炮三分如冷熱食積未分服蘇合丸降氣則即愈六神散此劑通治寒腹痛小兒下夜半曲腰而啼者寒腹痛其症面青白口有冷氣手足冷腹亦冷白茯苓白扁豆炒各二錢人參白朮山藥炒各一錢甘草炙七分姜三棗三此方加香附子便炒七分行氣尤妙如夾痰加茴香酒炒川楝肉炒山梔子炒黑沒藥各七分如夾濕加木通去節一錢澤瀉五分如夾蛔加苦楝根一錢檳榔五分導赤散此劑通治熱腹痛小兒上夜半仰身有汗而啼者熱腹痛其症面赤小便赤口中熱腹亦暖生地姜炒木通去節軟芩酒炒甘草各七分竹葉三片多是心熱傳小腸加麥門冬山梔仁碎炒各七分效尤捷一方腹熱宜溫散人參白芍藥酒炒甘草炙香附米便炒各四五分乾薑炒少許煎服亦效苦楝根湯小兒蟲腹痛十居八九其症心腹痛叫哭倒身撲手嘔吐清水涎沫面色青黃時止時作口唇紫黑者蛔厥苦楝根使君子各一錢白礬半生半枯檳榔各五分一方芥子蜜丸黍米大空心吞下一方棐子留內皮爛搗和清望前連服一方蚯蚓糞燒煅浸水去滓溫服止痛寸白蟲苦楝根亦主之一方服棐子服法上同乳香散小兒曲腰亂啼無淚面青白唇黑股冷或大便色青不實盤腸內吊為乳香沒藥各少許油研另取木香一塊於乳鉢內磨水一方滾數沸調乳沒末服之立效一方急煎蔥白淋洗腹部又蔥尉臍腹良久尿出痛止如上下腹痛川楝肉炒一二錢煎服如環腹痛酸棗仁去皮尖炒研一二錢煎服如小兒有㿗疝下焦觸冷疝氣上升而腹痛川楝肉炒茴香豬膽汁炒各一錢乾薑炒黑三分煎服奇效㿗疝睪子浮火碧梧桐葉濃煎溫洗極驗石膏平胃散小兒飲乳後即發痛者蓋乳母胃熱之致令乳母宜服此劑蒼朮陳皮厚朴姜炒各一錢石膏煅炒三錢草龍膽酒洗一錢甘草炙七分如乳母過食魚肉油膩之物加前胡一錢黃柏酒炒七分如乳母過食生冷去石膏龍膽草加乾薑炮一錢砂仁碎炒七分腹脹腹疳見疳積門此症由脾胃虛氣攻而作也消脹散此方治兒脹之聖劑纍試輒效蘿蔔子蘇梗乾葛各七分陳皮白朮枳殼麩炒甘草各五分如氣虛加人參二三分如氣急加蘇子葶藶子各五分沉香三分去白朮蓋白朮能閉氣故也如引飲倍入乾葛加天麻粉七分如發熱加山梔子炒黃連酒炒前胡各五分如泄瀉加白芍藥酒炒砂仁碎炒各五分木香三分如小便不通加木通去節一錢滑石五分如飲食停滯去白朮加神麯山楂肉姜炒各五分如惡寒手足冷加官桂五分如腰上浮腫加藿香五分如腰下浮腫加牛膝五分黃柏炒三分如脅痛面黑是氣鼓去白朮加青皮五分如脅滿小腹脹痛身上有血線是血鼓加當歸芍藥酒炒各七分牡丹皮紅花各三分去白朮如噯氣作酸飽悶腹脹是食鼓加山楂肉炒神麯姜炒半夏炒各七分去白朮如飽腹脹滿有塊如鼓是痞鼓加山楂肉炒神麯半夏炮姜炒當歸尾鱉甲山棗仁玄胡索醋炒各七分青皮三分去白朮如因胎腫毒氣入腹成脹加連翹牛蒡子荊芥穗茹片各七分如因瘧母成脹加柴胡鱉甲玄胡索醋炒各七分檳榔厚朴姜炒各三分如觸濕成脹加木通去節一錢蒼朮七分澤瀉五分如疳積成脹加山楂肉炒神麯姜炒各七分黃連姜炒青皮各五分如氣鬱成脹加香附子便炒厚朴姜炒各七分凡浮脹總作虛治之以參術為君陳皮茯苓為臣黃芩麥門冬為使少加厚朴大腹皮以消脹氣氣陷加升麻柴胡各三分提之為妙以治腫脹之大經大法也如虛脹胡椒全蠍各四十九個作末糊丸粟米大米飲下七八丸名榻氣丸如頭熱腹脹而足冷者脾風之候補脾益真湯主之如形瘦腹飽青絡滿腹者脾疳也肥兒丸主之吐瀉吐瀉泄黃傷熱乳也玉露散主之玉露散兼治暑月吐瀉身熱煩渴石膏寒水石並煅各五錢生甘草一錢為末米飲調下此方與辰砂益元散相似隨材所有用之可也暑月則生脈散和此方服之為妙如吐瀉泄青傷冷乳也益元散主之方見上保元湯下注如吐瀉昏睡露睛者胃虛熱也錢氏白朮散主之如昏睡不露睛者胃實熱也辰砂益元散主之辰砂益元散滑石六錢辰砂甘草炙各一錢砂仁炒一錢煎湯和服此方尤妙如吐驟或瀉完穀者傷風甚也風木侵脾土故也益元散加柴胡防風各七分青皮三分服之方見上保元湯下注燒針丸治吐瀉不止危甚兼治或吐或瀉黃丹硃砂枯礬等分為末棗肉作丸芡實大每一丸串針頭燒燈焰存性作末米飲調下此方清鎮專主吐瀉極妙如經年吐乳眼慢糞穢有筋膜者乃父母交感時吃乳所致名曰交情吐奶益黃散主之方見保元湯條余孫兒生七歲多吃紫桃數升許腹飽如鼓未幾大吐即吃白粥半器又盡吐之數升食頃之間大吐五六次面色青黑手足搐搦狀如將發慢驚者然急煎人參一錢和牛黃一分飲之入口即吐吐即又飲之合服人參一兩二錢牛黃一錢然後僅僅止吐遂連飲參茶漸得回蘇因以完復今既長成若非參黃之力何能保其生耶養幼之家不可不預備參黃以濟非命之夭也如早為直坐胃弱氣陷泄痢頻數保元湯加黃連酒炒砂仁炒各七分升麻三分服之如便色青白黃沫變易無常者乃疳痢也至聖丸主之或作湯溫服亦可至聖丸使君子麵煨陳皮木香厚朴姜炒肉豆蔻泡煨去油丁香皮各一錢神麯糊丸如赤痢膿血腹痛黃芩白芍藥酒炒各一錢半甘草一錢如虛滑固腸丸主之樗根白皮焙乾為末粥丸梧子大一方久遠泄痢陳曲末和清早朝空心服血痢尤效如白痢益元散主之虛弱之兒人參茶調服如赤白痢交雜或下膿血如爛肉汁黃連阿膠丸主之黃連酒炒阿膠珠山梔子姜炒黃柏酒炒各一錢桂心五分如諸泄痢滑石硫黃為末蜜水調服立效如兼吐加砂仁碎炒藿香酒洗各三四分如頭熱嘔吐而足冷或頭熱泄瀉而足冷者脾風之候也補脾益真湯主之大抵吐瀉總作虛熱治之必以參耆為主材可也暑痢暑泄黏米半生半熟黃土水入地龍十餘個爛烹去滓飲之尤妙和清亦可小兒泄瀉大甚閲月不止肉脫難救脫殼田螺炙而服之則瀉止生服治瀉肉脫兒之神方小兒及壯老赤白泄痢海衣細末和清服之泄痢忍冬藤炒去皮長二寸許二握及棗七枚濃煎和清服之久泄不止木通湯使乳母服之木通去節三錢白茯苓二錢半山梔子研炒黑二錢澤瀉車前子炒研各一錢肉桂五分甘梢三分病兒則木通一錢白茯苓七分山梔子澤瀉各五分車前子三分服之滲利小便則瀉自止矣赤白痢狗頭髓及生梨汁生清和服為妙脫肛因虛而夾熱縮砂散主之縮砂散砂仁碎炒黃連姜炒木賊等分米飲調下一方五倍子作末和油塗之一方鱉頭燒存性和真麻油調敷之一方田螺爛搗塗之奇效又田螺燒存性塗之云猾皮散因泄痢努力脫肛此方主之猾皮鱉甲並燒存性磁石煨醋淬研各五錢桂心三錢米飲調下一方枳殼五六錢煎湯溫洗肛門五倍子作末和蜜塗之下疳瘡腹際兩陰間小腫或赤爛消疳敗毒散柴胡黃柏赤芍藥酒炒赤茯苓木通去節草龍膽酒洗連翹荊芥穗黃連蒼朮知母酒炒防風獨活甘草各三分燈芯少許一方蛇床子煎湯頻洗瘡處雞子黃作油塗之以瘥為度一方雞卵油和石雄黃末塗之為妙痔疾治方一方碧梧桐皮煎湯洗痔瘡為妙一方生螳螂爛搗敷瘡處一方田螺爛搗炙火敷瘡處極妙大便不通治方硃砂水飛南星炮製巴豆霜等分為末糊丸黍米大薄荷湯和下一二丸即通如無巴豆霜代入大黃酒煨加皂角刺等分一方硃砂滑石並作末和蜜服之一方香油一盅子去冷飲二三次即效小便不通治方急取生地龍數條蜜少許同研敷陰莖上又蠶退紙燒灰硃砂龍腦麝香各少許麥門冬燈芯煎湯調灌口中即通如無腦麝代入木通去節赤茯苓生地酒炒三味煎湯只調硃砂服之亦可一方鵲腦髓和清酒服之如大小便俱不通蔥白汁乳汁各半匕調勻抹兒口中即吮乳乃通疳積草歲以下疳草歲以上勞腦疳頭皮光急頭髮作穗或有瘡腫至囟囟腫則多損眼腦熱如火囟腦高遍身多汗也脊疳蟲蝕脊膂骨如鋸齒拍背如鼓鳴十指背生瘡頻咬爪甲煩熱黃瘦也走馬疳蝕齒齦口瘡出血鼻氣齒黑脫落囟有穴者名曰走馬蓋陽明熱氣奔如馬也無辜疳腦後有核初生軟而不覺痛其中有蟲如米粉不速破去則熱氣漸長蟲隨氣血流散侵蝕臟腑黃瘦頭大手足細弱遂至於死也古方天有鳥名曰無辜晝伏夜游兒家洗浣衣繃露天經宿或遇此鳥飛過落羽所汙而與兒穿動令有此疾也丁奚疳腹大頸細黃瘦是也丁者手足與項極小伶仃也奚者腹大也甚者尻高肉削臍突胸滿愛吃生米土炭等物也哺露疳虛熱往來頭骨分解反食土蟲煩渴嘔噦骨瘦崚嶒露形也蓋諸疳皆因脾胃久虛形體瘦削而發也並宜十全丹十全丹陳皮青皮蓬朮此材太峻宜去之代入玄胡索川芎五靈脂白豆蔻檳榔蘆薈各五錢木香使君子各二錢上為末以豬膽汁浸糕和丸麻子大米飲下二三十丸如虛甚加人參一錢如冷疳至聖丸方見上主之兼治諸疳泄痢如熱疳五福化毒丹方見上主之肥兒丸此方消疳化積磨癖清熱伐肝補脾進食殺蟲也胡黃連五錢使君子四錢五分人參黃連姜炒神麯麥芽炒山楂肉各二錢半白朮白茯苓甘草炙各三錢蘆薈煨二錢半上為末黃米糊和丸緑豆大米飲下二三十丸消食丸通治五疳殺蟲退熱磨積進食五疳五腸之疳也使君子草龍膽麥芽炒陳皮蕪夷神麯黃連山楂肉各等分上陳米飯和丸黍米大米飲下二三十丸或作煎湯亦可諸疳蛇脯作丸服之最妙有驗齒疳土鼠乾肉作末和清塗之為妙一方蛇膽塗之亦效瘧母寒熱往來一日一發或間日一發者瘧母之夾也左脅下如覆杯者乃瘀血夾濕痰清肝湯主之加味清肝湯左脅屬肝肝經濕熱夾瘀血而結成瘧母柴胡山梔子炒川芎當歸白芍藥酒炒鱉甲醋炒各七分玄胡索五分檳榔青皮甘草各三分上服二三帖以瘥為度而三帖無效又服可也如氣弱加人參二三分柴胡二陳湯治右脅下覆杯如痰飲成瘧者也柴胡陳皮半夏炮干炒赤茯苓鱉甲各七分玄胡索五分檳榔青皮甘草各五分如氣弱加人參二三分如痰癖加何首烏五分一方硃砂檳榔石雄各三分為末牟甘酒調和當日飲之則神效此方治鱉瘧一方患瘧母黃瘦地鼠肉或炙或烹食之一方小兒老瘧松寄生一二錢煎服之一方丁香一錢半草果面炮煨一錢巴豆霜一分許小兒瘧疾久不瘥者服此極驗年壯瘧疾材倍入更加乾薑五片可也此名丁香散竊觀俗人輕視此症先試章門針灸次飲雜藥頗多得效第章門近於血幕而不能明知穴處誤加針刺血流如射則欲為止血而艾灸其上則血不得外流而內湧聚結仍成內腫曾多見之或章門灸處觸風成瘡終未完合仍為致夭者間亦有之或飲峻毒單方漸至戍削骨立不至成長亦或有之此保幼之家所當深戒須忌針灸及毒藥制此和平之藥如丁香散之類久服則萬無不效之理且切禁生冷之飲可也黃瘦小兒無指的形症而自然黃瘦乃傷於乳食也肥兒丸主之養元粥蓮實肉山藥薏苡仁硬米等分為末作粥常常服之加入砂糖為妙痰厥痰隨氣火而上升成厥也夏術天麻湯治痰厥脾胃虛弱頭痛如裂身重如山四肢厥冷嘔吐眩暈目不敢開如在風雲下半夏曲陳皮麥芽炒各一錢白朮神麯姜炒各七分人參蒼朮黃耆蜜炙天麻白茯苓澤瀉各五分黃柏酒炒二分乾干三分姜三片如瘦人多火血燥去蒼朮澤瀉加當歸白芍藥酒炒各七分為妙半夏性燥不可久服代入貝母一錢枳實治痰有沖牆倒壁之功宜加五六分如火降則痰自消加山梔子五分山梔能降火從小便出故也如氣降則痰自下加烏藥附子各五分如脾胃虛弱倍入參耆加白豆蔻面炮煨三分如腹痛如裂加白芷五分川芎細辛各三分如身重如山倍入澤瀉乾干如嘔吐甚加藿香酒洗砂仁碎炒各五分如眩暈甚倍入天麻加川芎五分如四肢厥冷加官桂五分白附子能引諸藥上行頭部且有引痰之力痰在頭部者非白附不能除治痰厥者宜略入二三分可也新得此症者以行氣降火消痰為主久者以補氣血順氣為主可也如頭痛如裂灸百會上星各五壯針太淵列缺瀉凡痰疾吐為上宜服雀舌茶探吐甚妙但虛弱之人不可試余兒時患急驚多服諸方而持久不瘥過九歲後轉成痰厥頭痛如碎眩暈亦甚多服導痰之劑而終未見效漸至戍削肉脫骨立余想痰厥之治未暇論而血氣枯竭似難枝梧遂服八物二陳湯五十餘帖肌膚稍勝病勢自減得免為病廢之人古云正氣實則邪氣退者此之謂也中風凡風漸多因濕痰乘虛流注氣血壅滯而宜先用順氣飲以通血道然後繼用本藥為可烏藥順氣散治四肢骨節痛肢體頑手足癱瘓言語蹇澀筋脈拘攣烏藥去皮心酒洗麻黃陳皮各一錢川芎白芷白殭蠶桔梗枳實去穰麩炒各七分乾薑炒甘草各一兩姜三棗三元氣先虛後受風宜加人參三四分風非大汗不能除麻黃去節及根加荊芥穗三四分如有虛汗去麻黃加黃耆生用七分加減疏風湯治手足不仁或強直或柔軟羌活防風陳皮赤茯苓半夏泡姜炒烏藥去皮心酒炒香附子便炒細辛甘草各五分如左臂不仁加當歸川芎各五分薄桂三分竹瀝薑汁各半匙如強直加麻黃去節五分如柔軟加白殭蠶去觜姜炒五分如左腳不仁加川芎當歸獨活各五分桂皮三分如右臂不仁加白朮五分人參薄桂各三分竹瀝薑汁各半匙如右腳不仁加人參三分白朮獨活各五分桂皮三分加減養榮湯治半身不遂屬血虛夾濕痰當歸白芍藥酒炒川芎乾地姜炒陳皮半夏姜泡炒羌活獨活防風軟芩酒炒柴胡烏藥去皮心酒炒甘草各五分竹瀝薑汁各半匕左邊雖屬血然血隨氣而行略加人參二三分以通氣道為可如猝然語訥風中舌本加麥門冬五分遠志姜炒細辛石菖蒲犀角各三分如無汗惡寒倍入防風加麻黃去節杏仁去皮尖研各五分如有汗惡風加杏仁五分桂枝三分如六經混淆指節攣痛倍入羌活加連翹五分如一身俱麻加人參白朮麥門冬各五分如遍身疼痛倍入當歸加乳香沒藥各五分官桂三分如痛在上者屬風倍入羌活威靈仙五分如痛在下者屬濕加牛膝木通去節漢防己各五分黃柏酒炒二分半如腰膝流注疼痛倍加當歸甘草加硝石車前子海金沙各五分如痰氣壅盛加南星炮製姜炒木香各三分如手足搐搦倍入羌活防風加山梔姜炒白殭蠶姜炒各五分如左癱倍入當歸川芎如右瘓加人參白朮各五分全蠍姜炒三分如久患癱瘓加天麻南星炮薑製木香各五分倍入當歸羌活防風如肌肉蠕動倍入羌活如口眼喎斜倍入羌活防風加全蠍姜炒荊芥穗忍冬藤各五分如口噤加乳香五分如大寒後加柴胡五分人參三分如孟夏之月加石膏煅軟芩酒炒各五分知母酒炒三分如季夏之月加白朮白茯苓漢防己酒洗各五分如大暑之後加藿香酒洗五分厚朴姜炒肉桂各三分如霜降之後加當歸五分肉桂三分附子泡製一分半如勞汗當風汗出為皶郁乃痤倍入當歸白芍藥如癮疹加麻黃去節五分荊芥穗三分蔥白三莖如小便淋閉加滑石連翹各五分木香三分如咳嗽喘急加桔梗紫菀各五分如頭旋腦熱鼻寒瀉涕加黃連酒炒五分薄荷三分人參敗毒散治表症頭痛壯熱惡風及風痰咳嗽鼻塞聲重瘟疫發毒頭面腫痛痢疾發熱諸般瘡毒小兒驚痘疹羌活獨活柴胡前胡桔梗川芎赤茯苓人參枳殼甘草各一錢薄荷少許姜三片凡未經痘疹之兒勿論壯弱俱宜服此預消胎熱腫毒最妙加防風荊芥穗天麻地骨皮連翹各七分如瘦兒多火血燥加當歸白芍藥酒炒各一錢如肥兒多濕加白朮澤瀉各七分如痰多加貝母一錢枳實五分甚則合小調中湯如腎虛加熟地一錢知母黃柏並鹽水炒各五分如引飲加天花粉天門冬各一錢知母乾干各五分如頭面多瘡癤加連翹防風各七分如遍身皮風腫癢加連翹防風荊芥穗白蒺藜去刺各一錢如濕瘡多發加荊芥穗葛根蒼朮白朮澤瀉各七分如素多風熱加葛根升麻各一錢如氣火上升時時面赤加香附子烏藥各七分玄參知母乾干各五分如下焦虛冷加肉桂乾干各五分如有怔忡加麥門冬酸棗仁另炒各一錢如左脅下有動氣加山梔草龍膽各一錢竊觀小兒十歲前未破陰而有純陽之氣故不待服藥而善行痘疹或未免夭者皆因胎熱乘時肆毒之致近來鄉鄙罕入痘疹年長之後戕賊血氣者得嬰此病則真元已虛熱毒鬱結安能善為起泡而收靨乎恨余不曾早學此理而獨子夭折於此疾竟抱無涯之戚矣所聞有一古醫以此方預服未痘之人無一不效云今見列方則解熱消毒莫此為妙其言不誣如臂痛加薄桂蒼朮各五分紫蘇葉三分如腳膝浮腫倍入獨活加牛膝五分如腰痛加牛膝杜仲鹽炒八角茴香酒浸炒各五分如眼眩加細辛細茶各三分如四肢冷痹加官桂五分附子炮製一分半如胸膈脹滿加枳實麩炒莪朮醋炒各三分如虛汗加生黃耆五分如賊風加荊芥穗薄荷各三分倍入羌活獨活如中寒加乾薑炮五分大附子炮製一分半中風口噤咽谷或針或灸加味六君子湯治右半身不遂屬氣虛夾濕痰白朮白茯苓人參陳皮半夏炮薑製羌活獨活防風軟芩酒炒升麻烏藥去皮心酒洗甘草各五分竹瀝薑汁各半匕右邊雖屬氣然風行於血絡故補血則風自消宜加歸芍一二味可也如全身不遂屬氣血俱虛夾濕痰上二劑養榮湯君子湯合服名曰加味八物二味湯六味丸治中濕下部無氣坐地不遷熟地姜炒四兩山藥山茱萸白茯苓各二兩澤瀉牡丹皮蒼朮各一兩白殭蠶七錢黃柏酒炒三錢疊指小兒疊指者乃所屬經絡之虛而風濕流注之致宜用祛風湯預防風漸可也加減祛風湯當歸防風獨活陳皮白芍藥酒炒白朮烏藥去皮心酒洗甘草各五分如足拇指次指相疊加山藥黃耆姜炒川芎草龍膽酒炒柴胡各五分澤瀉青皮各三分人參二分半附子炮製一分半如足中指次指相疊加山藥黃耆姜炒熟地姜炒各五分肉桂澤瀉各三分黃柏酒炒二分半附子一分半如足中指第四指相疊加熟地山茱萸酸棗仁另炒各五分草龍膽澤瀉各三分黃柏二分半附子一分半如足第四指五指相疊加山茱萸酸棗仁各五分益智仁澤瀉各三分黃柏二分半附子一分半附子雄壯之資有斬關奪將之勢驅散在表之風寒況其無經不入下至指節者乎治風家宜略入二三分藉其通行指節之力可也足五指無氣而曳地者氣虛夾濕而然加參耆獨活澤瀉足後跟無氣而曳地者氣虛夾痰而然加參耆二陳之屬破傷風魚膠燒存性作末和溫酒服之角弓反張亦治之一方紫檀香或白檀香及黃蠟同煎服之極效龜背松蕊丹松花枳殼麩炒防風獨活各一兩麻黃大黃酒煨前胡桂心各五分蜜丸黍米大飲下脊骨夾濕則大筋縮短夾熱則小筋弛張宜加生地乾炒漢防己蒼朮各五錢澤瀉三錢黃柏酒炒一錢半龜胸百合丹大黃酒煨七錢半天門冬杏仁百合木通去節桑白皮枳殼甜葶藶石膏煅各五分蜜丸白湯下有一兒胸骨突起已成龜胸疳積相因痰飲膈結而然服肥兒丸數三劑而愈龜胸龜背蛇脯作丸大服而愈調榮活絡湯治腰脊觸傷或折當歸川芎赤芍藥酒炒生地乾炒羌活各七分牛膝五分桃仁去皮尖研大黃酒煨桂枝紅花各三分解顱由疳熱而成三神散乾薑炮七錢半細辛桂心各五錢上為末薑汁調敷顱上囟填腫突出則瀉青丸主之砂糖水調下囟陷成坎黃狗頭骨炙黃為末雞子清調敷之囟門不合灸臍中上下三壯五軟健骨散治頭項軟腳軟手軟身軟口軟白殭蠶去嘴炒為末五分或一錢薄荷泡酒調下三次如五硬烏藥順氣散主之方見中風眼病補肝散治肝虛風熱上攻癢痛或圓翳在黑珠上昏花柴胡白芍藥酒炒熟地乾炒白茯苓各五分甘菊細辛柏子仁防風甘草各三分如肝經太虛加羊肝作末一錢調服酸棗仁另研決明子酒蒸研各五分如見五花或一物二形加羚羊角人參羌活玄參車前子各三分撥雲散治翳膜多淚癢痛羌活防風柴胡各七分甘草五分目得血而能視加當歸熟地乾炒各五分如熱甚加黃連乾炒草龍膽各五分如風熱壅盛倍入防風加荊芥穗五分如左眼翳膜合四物湯如右眼翳膜合四君子湯如精彩不足加人參熟地乾炒草龍膽酒炒各五分如腎虛加熟地乾炒七分知母鹽水炒三分如赤腫加連翹七分如白睛紅加白豆蔻麵煨五分如上下瞼赤腫加蒼朮升麻山梔子酒炒陳皮各五分厚朴乾炒三分如眼胞及眼下如炭煙燻黑者痰也加半夏炮干制貝母乾製各五分青皮二分如心神亂而不守卒然見非常之怪若邪中其睛則精散視歧加人參五分麥門冬酸棗仁另炒白茯神決明子酒蒸各七分青葙子五分蟬蛻二分半如脾虛則五臟精氣皆失所司不能歸明於目加白朮人參山藥各五分如瞳子散大則青瞘之漸加黃連黃芩並酒炒當歸身生地天門冬各五分地骨皮五味子各三分如羞明怕日加蜜蒙花五分如起倒睫加細辛五分如起拳毛加麻子五分如治目瘡加荊芥穗五分如多淚倍入防風加蘇葉三分如疼痛加黃耆白芷各五分如癢甚加白蒺藜五分如青盲加人參五分決明子青葙子各七分蟬蛻升麻各三分如諸翳膜加決明子草龍膽各七分木賊蟬蛻各三分人參一二分如翳目瞳子上始者屬腎膽加草龍膽玄參各五分知母黃柏並鹽酒炒各三分如翳目白睛上始者屬肺加桔梗山梔子各七分如翳目白黑間始者屬脾加山梔升麻黃連酒炒各五六分如翳目黑睛上始者屬肝加黃連草龍膽青皮各五六分如翳目內眥始者屬膀胱大腸加山梔連翹各七分知母芒硝各三分木通七分如翳目外眥始者屬膽小腸加黃芩酒炒草龍膽木通各七分大黃酒煨二分雀目因心血不足肝金倀受或土氣有餘而侮其不勝木高風上升之致宜四物湯主之加味四物湯當歸生地乾炒白芍藥酒炒川芎陳皮蒼朮厚朴乾炒各五分如高風加羌活白芷各五分如小兒過食脾胃受傷亦發此症消食丸主之雀目手大指爪甲後第一節橫紋中向上針一分許小兒及壯者皆神效又橫紋頭內側白肉際灸三四壯亦效一方碧魚爛烹熏其熱臭亦效兩目猝浮不能開見濁汁流出瀉青丸加貝母蒼朮草決明人參桑白皮或作湯服之亦可有一兒左上唇上結核一宿核移左腮又一宿核移左目上胞因疼痛大浮如拳目睛以此突然突出如瘤症大如木瓜塊余命以石膏平胃散加草決明一錢人參青皮各五分服十餘帖而愈人皆異之如眼被撞刺有血痕因生翳膜輕效散主之柴胡當歸赤芍藥酒炒大黃酒煨犀角各一錢甘草五分夜啼附咳喘小兒夜啼不止狀若鬼祟蟬花散蟬殼下半截為末初生兒炒一字薄荷湯入酒小許調下即止或誤以上半截為末調服則啼復如故古人格物之妙如此一方蟬蛻二七枚去頭足為末入硃砂一字蜜調送下為妙一方小兒達夜啼號使其父負兒持刀潛斫鄰家籬帶勿使人知之兒啼即止然後潛還系其斫帶則永不啼如夫音聲嘶清音散主之清音散訶子皮半生半炒三錢桔梗半生半炮五錢甘草半生半炙二錢木通半生半炙三錢生地汁調下此方加天門冬山藥貝母杏仁潤補金經尤妙如天行咳喘三拗湯主之三拗湯麻黃杏仁甘草各一錢劑留杏仁之皮尖麻黃之根節蓋以藉其毒而治痰止喘也如痰盛加貝母乾製七分如氣虛加人參三四分如感冒風寒加柴胡五分蘇葉三分如喘甚加紫菀款冬花各五分如痰盛喘甚者氣降則痰化而喘止蘇合丸和蜜服之立效變蒸惺惺散治變蒸傷於風寒發熱痰嗽煩渴人參白朮白茯苓桔梗川芎白芍藥酒炒天花粉甘草各三分半如變症甚加硃砂全蠍各三分麝香一字以防驚風之候如感冒風寒加柴胡前胡防風各二分半如傷風汗多加生黃耆五分如傷寒無汗加蘇葉三分如喘甚加貝母杏仁各二三分如便泄加砂仁炒二三分如有驚風加酸棗仁另炒二分半臍風附旋螺風等小兒斷臍後為風濕所傷面赤喘急啼聲不出其症臍腫奕奕腹脹滿日夜多啼不能飲乳甚則抽搐口噤撮口宜並宣風散主之宣風散治臍風撮口多啼不能吮乳口出白沫全蟬二十一枚酒炙為末入麝香一錢和白每取半字以金銀器煎湯調下通心飲治旋螺風赤腫而痛清心火通小便退潮熱連翹木通瞿麥山梔仁軟芩甘草各四分入燈芯麥門冬同煎服之最效保命散治鵝口瘡不能吮枯礬硃砂各一錢馬牙硝五分為末取一字用鵝糞白擂水調塗舌上口內日三次即效如胎熱流毒於心脾二經舌強唇青撮口聚面白殭蠶二枚略炒為末蜜調敷唇即效如重舌或舌上下生瘡腐爛通心飲加白殭蠶四分服之瀉黃飲子治口唇緊小不能開合或唇燥深裂無色名曰重唇升麻白芷枳殼軟芩防風半夏姜炒石斛各一錢甘草五分如無石斛代入犀角五分一方黃連黃柏作末蜜調敷唇上如齒疳蔓延唇鼻俱腐通心飲加石膏煅四分服之一方枯礬青黛人中白五倍子黃柏為末蜜調塗之以瘥為度咽喉浮塞症干松茸沉溫水飲之或煎服鼻淵鼻流濁汁甚則腦消宜急治之防風湯防風片芩酒炒川芎麥門冬各五分人參二分半甘草三分上方加連翹玄參各五分尤妙愛吃泥土此症由脾胃虛熱所致此脾疳也清胃養脾湯石膏一錢陳皮白朮赤茯苓甘草軟芩酒炒各二分一方好黃土黃連煎水作餅曬乾與吃即止滯頤口角流涎曰滯頤冷涎宜溫胃丁香益智仁煎服熱涎宜清胃山梔天花粉煎服小兒常流清涎者胃有蛔蟲之漸苦楝根湯主之齒久不生附發久不生此由氣不足芎黃散主之芎黃散川芎生地黃當歸山藥白芍藥各一兩沉香五錢甘草三錢為末白湯調下將乾末擦齒上日二次白湯調下每五分發久不生由血不足蓯蓉丸主之蓯蓉丸當歸生地肉蓯蓉白芍藥各一兩胡粉五分蜜丸黍米大每十丸黑豆湯吞下兼作餅敷頭行遲六味地黃丸加鹿茸牛膝五加皮五味子如無鹿茸代入白殭蠶亦可語遲地黃丸加鹿茸五味子白殭蠶如無鹿茸代入枸杞子亦可如四五歲不言足內踝尖各灸三壯稀痘法小兒須服稀痘方以消胎熱之毒則行痘時痘顆稀少且無諸般危證兔紅丸臘月初八日取生兔一隻取血以蕎麥麵和之少加雄黃三四分候乾作末丸緑豆大乳汁送下一歲兒五丸或七丸三歲後十五丸久服則遍身發出紅斑即其驗也有終身不出痘疹者雖出亦稀少小兒既長以兔血啖之亦妙臘月兔雖可用也然終不若八月之佳一方硃砂之於痘也令密者可稀稀者可無黑陷者可起痘癰者可消略加三分於上丸尤妙但性寒不可多服獨聖丹絲瓜近葉取三寸連皮納於沙瓶中以桑柴火燒存性為末倍入砂糖搗成餅時時與兒吃盡為佳服此則痘顆之多者可少少者可無重者可輕一方云和硃砂少許為妙服梅花法臘月取梅花不拘多少陰乾為末煉蜜丸芡實大每一丸好酒化下念太一救苦天尊一百遍妙不可言龍鳳膏烏雞卵一隻打開一小竅納地龍細小活者一條後防竅蒸熟去地龍令兒服下每歲立春日一枚終身不出痘敢以管見偕為加減以待知者取捨耳加減人參敗毒散羌活獨活前胡柴胡蜜炙人參當歸身酒洗川芎酸棗仁去皮尖研另炒貝母去心乾製葛根各一錢桔梗牛蒡子研酒炒連翹防風各七分枳殼麩炒犀角甘草知母酒炒乾干炒黑各五分如有諸症依上加減更為裁製用之可也預服此劑百餘帖則非但痘顆之稀少可無平生瘡疽諸般毒腫之患甚是妙劑
